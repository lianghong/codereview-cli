      # MiniMax M2 (via NVIDIA)
      # Best for: Quick code analysis
      - id: minimax-nvidia
        full_id: minimaxai/minimax-m2
        name: MiniMax M2 (NVIDIA)
        aliases:
          - mm2-nvidia
        pricing:
          input_per_million: 0.00
          output_per_million: 0.00
        inference_params:
