          same context window. Best for high-volume reviews and CI.

  # Moonshot AI (Kimi) Direct API Provider
  # Uses langchain-moonshot's ChatMoonshot, which extends BaseChatOpenAI
  # and handles Kimi-specific parameter constraints (kimi-k2.5 thinking
  # mode requires temperature=1.0 / top_p=0.95; kimi-k2.6 server-side
  # rejects `tool_choice='specified'` while thinking is enabled, so we
  # route k2.6 through prompt-based JSON parsing — see supports_tool_use
  # below).
  #
  # Two separate platforms with separate accounts/keys:
  #   - .cn (Chinese): https://api.moonshot.cn/v1   (platform.moonshot.cn)
  #   - .ai (international): https://api.moonshot.ai/v1  (platform.moonshot.ai)
  # KIMI_API_KEY usually maps to the .cn console. Override base_url here
  # if your key is from platform.moonshot.ai instead.
  moonshot:
    api_key: "${KIMI_API_KEY}"
    base_url: "https://api.moonshot.cn/v1"
    request_timeout: 300
    models:
      # Kimi K2.6 - flagship long-horizon agentic coding model
      # 1T MoE, 32B active, 384 experts, 256K context
      - id: kimi-k2.6
        full_id: kimi-k2.6
        name: Kimi K2.6 (Moonshot)
        aliases:
          - kimi
          - kimi26
          - kimi-moonshot
        pricing:
          # Moonshot list price (https://platform.moonshot.ai/pricing)
          # Update if upstream changes; treat as a starting estimate
          # since the docs page wasn't directly fetchable at config time.
          input_per_million: 0.60
          output_per_million: 2.50
        inference_params:
          # Moonshot's K2.6 server-side enforces temperature=1.0 and
          # top_p=0.95 (same constraint as K2.5 with thinking enabled).
          # Sending any other value yields HTTP 400:
          #   "invalid temperature: only 1 is allowed for this model".
          # K2.6 is trained for sufficient determinism at fixed t=1.0;
          # do NOT lower for code review here.
          default_temperature: 1.0
          default_top_p: 0.95
          max_output_tokens: 16384
        context_window: 262144
        # Moonshot's server rejects `tool_choice='specified'` while
        # K2.6's implicit thinking mode is enabled (HTTP 400:
        # "tool_choice 'specified' is incompatible with thinking
        # enabled"). `.with_structured_output()` would set exactly
        # that tool_choice under the hood, so we route K2.6 through
        # prompt-based JSON parsing instead — same pattern as MiniMax
        # M2.5 on Bedrock and DeepSeek-V4-Pro on Azure.
        supports_tool_use: false
        architecture: "MoE (1T total, 32B active, 384 experts)"
        capabilities:
          - reasoning
          - code_review
          - code_generation
          - long_horizon_agentic
          - structured_output
          - thinking
        notes: >-
          Long-horizon agentic coding with thinking mode. Tool use
          conflicts with thinking on Moonshot's server, so structured
          output is produced via prompt-based JSON parsing
          (PydanticOutputParser) — see supports_tool_use above.

  # Z.AI (Zhipu International) Provider
  # OpenAI-compatible endpoint at https://api.z.ai/api/paas/v4/
  # Models exposed via langchain-openai's ChatOpenAI with custom base_url
  # — no langchain-community dependency.
  zai:
    api_key: "${ZAI_API_KEY}"
    base_url: "https://api.z.ai/api/paas/v4/"
    request_timeout: 300
    models:
      # GLM-5.1 (Z.AI)
      # Long-horizon coding model: can plan/execute on a single task
      # autonomously for hours. 203K context, function calling supported.
      - id: zhipuai/glm-5.1
        full_id: glm-5.1
        name: GLM-5.1 (Z.AI)
        aliases:
          - zai-glm
          - glm-zai
          - glm5.1-zai
        pricing:
          # Z.AI direct list price (per third-party aggregators; the
          # official docs.z.ai pricing page wasn't fetchable at config
          # time — update if you have the canonical rate).
          input_per_million: 1.40
          output_per_million: 4.40
        inference_params:
          # Lower temperature for deterministic code review
          default_temperature: 0.3
          default_top_p: 0.95
          max_output_tokens: 16384
        context_window: 202752
        # Z.AI's OpenAI-compat endpoint does not honor OpenAI's json_schema
        # response_format that .with_structured_output() sets — GLM-5.1 returns
        # markdown-fenced JSON (```json ... ```), which the json_schema parser
        # rejects with "Invalid JSON: expected value at line 1 column 1". Route
        # through prompt-based JSON parsing (PydanticOutputParser strips the
        # fences), same pattern as Kimi K2.6 on Moonshot.
        supports_tool_use: false
        capabilities:
          - reasoning
          - code_review
          - code_generation
          - long_horizon_agentic
          - tool_use
          - structured_output
        notes: >-
          Long-horizon coding model with sustained autonomous execution.
          OpenAI-compatible endpoint. Structured output via prompt-based JSON
          parsing (supports_tool_use: false) — Z.AI ignores OpenAI's
          json_schema response_format and returns markdown-fenced JSON.

  # OpenAI-on-Bedrock Provider (OpenAI-compatible endpoint)
  # AWS hosts OpenAI's frontier models (GPT-5.5, GPT-5.4, Codex) on Amazon
  # Bedrock. This is a DIFFERENT path from the SigV4-based "bedrock" provider
  # above: the OpenAI-compatible surface authenticates with an Amazon Bedrock
  # API KEY (a bearer token, NOT AWS creds) and is driven with langchain-openai's
  # ChatOpenAI + custom base_url — same mechanism as the Z.AI provider.
  #
  #   OPENAI_API_KEY        → the Amazon Bedrock API key (generate in the
  #                           Bedrock console; this is NOT an openai.com key)
  #   OPENAI_BASE_URL       → your region's Bedrock OpenAI endpoint
  #   BEDROCK_OPENAI_MODEL_ID → paste into each model's `full_id` below
  #
  # No new dependency: langchain-openai (already required) pulls the `openai`
  # SDK, which reads OPENAI_API_KEY/OPENAI_BASE_URL natively.
  #
  # full_id holds the wire-level model id. It is a LITERAL here (not
  # ${BEDROCK_OPENAI_MODEL_ID}) because an unset env var would expand to "" and
  # fail full_id's min_length validation, breaking --list-models. Replace the
  # placeholders below with the exact model IDs from your Bedrock console.
  bedrock_openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "${OPENAI_BASE_URL}"
    request_timeout: 300
    models:
      # GPT-5.5 — OpenAI frontier reasoning model, GA on Amazon Bedrock.
      # Reasoning model: rejects temperature/top_p (no default_temperature),
      # surfaces reasoning summaries via the Responses API (use_responses_api).
      # Tool calling works for structured output → supports_tool_use stays true
      # (mirrors GPT-5.4 on Azure). Flip to false if a forced tool_choice ever
      # returns the tool call as literal text on this endpoint.
      - id: gpt5.5-bedrock
        # TODO: replace with the exact model id from your Bedrock console /
        # the value of BEDROCK_OPENAI_MODEL_ID (e.g. "openai.gpt-5.5-...:0").
        full_id: openai.gpt-5.5
        name: GPT-5.5 (Bedrock)
        aliases:
          - gpt5.5-bedrock
          - gpt-bedrock
        pricing:
          # TODO: confirm Bedrock-hosted rates from the AWS pricing page.
          # Placeholder mirrors OpenAI-direct GPT-5 family list pricing.
          input_per_million: 2.50
          output_per_million: 15.00
        inference_params:
          # No default_temperature/top_p — GPT-5 reasoning models reject them.
          max_output_tokens: 128000
        use_responses_api: true
        context_window: 400000
        supports_tool_use: true
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - structured_output
          - tool_use
        notes: >-
          OpenAI GPT-5.5 hosted on Amazon Bedrock via the OpenAI-compatible
          endpoint (bearer-key auth, ChatOpenAI + base_url). Reasoning model:
          Responses API, no temperature/top_p.

      # GPT-5.4 — sibling frontier reasoning model, also GA on Bedrock.
      - id: gpt5.4-bedrock
        # TODO: replace with the exact Bedrock model id for GPT-5.4.
        full_id: openai.gpt-5.4
        name: GPT-5.4 (Bedrock)
        aliases:
          - gpt5.4-bedrock
        pricing:
          input_per_million: 2.50
          output_per_million: 15.00
        inference_params:
          max_output_tokens: 128000
        use_responses_api: true
        context_window: 400000
        supports_tool_use: true
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - structured_output
          - tool_use
        notes: >-
          OpenAI GPT-5.4 hosted on Amazon Bedrock via the OpenAI-compatible
          endpoint. Reasoning model: Responses API, no temperature/top_p.

# Default model configuration
defaults:
  bedrock_default: opus4.8
  azure_default: gpt-5.4
  nvidia_default: mistral-medium-nvidia
  zai_default: zhipuai/glm-5.1
  deepseek_default: deepseek-v4-pro
  moonshot_default: kimi-k2.6
  aws_region: us-west-2
  max_tokens: 16000

# File scanning configuration
scanning:
  max_file_size_kb: 500
  warn_file_size_kb: 100
  exclude_patterns:
    # Dependency directories
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/vendor/**"
    # Build outputs
    - "**/dist/**"
    - "**/build/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/*.pyo"
    # Version control
    - "**/.git/**"
    - "**/.svn/**"
    # IDE and editors
    - "**/.vscode/**"
    - "**/.idea/**"
    - "**/*.swp"
    # Test fixtures and generated code
    - "**/test_data/**"
    - "**/fixtures/**"
    - "**/*_pb2.py"
    - "**/*_pb2_grpc.py"
    # Common non-review files
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/migrations/**"
    - "**/*.lock"
  exclude_extensions:
    - ".json"
    - ".yaml"
    - ".yml"
    - ".toml"
    - ".md"
    - ".txt"
    - ".rst"
    - ".jpg"
    - ".png"
    - ".gif"
    - ".svg"
    - ".bin"
    - ".exe"
    - ".so"
    - ".dylib"
    - ".pyc"
    - ".pyo"

# Code Review Recommendations
#
# For accurate, deterministic code review:
# - Use temperature 0.0-0.3 (lower = consistent)
# - Use top_p 0.8-0.95 for controlled output
# - Prefer models with strong SWE-bench scores
#
# Model selection by use case:
# - Quick: Haiku ($1/$5) or Qwen ($0.22/$1.40)
# - Standard: Sonnet 4.6 ($3/$15) or Gemini ($2/$12)
# - Complex: Opus ($5/$25) or GPT-5.3 ($1.75/$14)
# - Budget: Qwen ($0.22/$1.40) or Grok ($0.20)
