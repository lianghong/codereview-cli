        aliases:
          - ds-v4-nvidia
          - dsv4-nvidia
          - deepseek-v4-nvidia
        pricing:
          # Free endpoint on build.nvidia.com
          input_per_million: 0.00
          output_per_million: 0.00
        inference_params:
          # NVIDIA model card recommends temp=1.0, top_p=0.95
          default_temperature: 1.0
