          max_output_tokens: 16384
        context_window: 128000
        capabilities:
          - code_review
          - code_generation
          - debugging
          - agentic_coding
        notes: >-
          72.2% SWE-Bench Verified,
          excellent for code review tasks

      # Mistral Small 4 119B (Mistral AI)
