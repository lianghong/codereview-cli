          reasoning_effort: high
        context_window: 262144
        architecture: "Dense (128B, multimodal)"
        capabilities:
          - code_review
          - code_generation
          - reasoning
          - multimodal
          - tool_use
        notes: >-
          Mistral's flagship merged model. 77.6% on
          SWE-Bench Verified. Per-request reasoning_effort
