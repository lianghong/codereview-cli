# Model Configuration for Code Review Tool
# This file defines all available AI models
# for code review analysis
#
# Pricing/parameters researched: January 2026
# Sources: AWS Bedrock, Azure OpenAI,
#   Anthropic, Moonshot, Alibaba, Zhipu

---
version: "1.1"

providers:
  # AWS Bedrock Provider
  bedrock:
    region: us-west-2
    models:
      # Claude Models (Anthropic)
      # Best for: Code review, reasoning, security
      - id: opus4.8
        full_id: us.anthropic.claude-opus-4-8
        name: Claude Opus 4.8
        aliases:
          - claude-opus-4.8
          - opus-4.8
          - claude-opus-48
        pricing:
          input_per_million: 5.00
          output_per_million: 25.00
          cache_write_per_million: 6.25
          cache_read_per_million: 0.50
        inference_params:
          # Opus 4.8 is a reasoning model - temperature not supported
          # default_temperature omitted intentionally
          max_output_tokens: 128000
        context_window: 1000000
        # Opus 4.8 only supports thinking.type="adaptive" and engages thinking
        # server-side per request. Anthropic forbids a forced tool_choice while
        # thinking is active (only "auto"/"none" allowed), but
        # .with_structured_output() sets exactly that forced tool_choice — so on
        # batches where the model thinks, the tool call comes back as literal
        # text and CodeReviewReport.issues fails with a list_type error. Route
        # through prompt-based JSON parsing instead (same pattern as Kimi K2.6).
        supports_tool_use: false
        capabilities:
          - code_review
          - security_analysis
          - reasoning
          - computer_use
          - adaptive_thinking
        notes: >-
          Latest Opus model (May 2026) optimized for coding, agents,
          and deeper reasoning. 1M-token context, up to 128K output.
          Reasoning model - temperature parameter not supported.
          Adaptive thinking is incompatible with forced tool_choice, so
          structured output uses prompt-based JSON parsing (supports_tool_use:
          false). Geo-US inference profile; routes us-east-1/us-east-2/us-west-2.

      - id: opus4.7
        full_id: us.anthropic.claude-opus-4-7
        name: Claude Opus 4.7
        aliases:
          - claude-opus-4.7
          - opus-4.7
          - claude-opus-47
        pricing:
          input_per_million: 5.00
          output_per_million: 25.00
          cache_write_per_million: 6.25
          cache_read_per_million: 0.50
        inference_params:
          # Opus 4.7 is a reasoning model - temperature not supported
          # default_temperature omitted intentionally
          max_output_tokens: 128000
        context_window: 1000000
        # Same adaptive-thinking / forced-tool_choice incompatibility as Opus
        # 4.8 (see that entry). Route structured output through prompt-based
        # JSON parsing instead of .with_structured_output().
        supports_tool_use: false
        capabilities:
          - code_review
          - security_analysis
          - reasoning
          - computer_use
          - adaptive_thinking
        notes: >-
          Opus model with enhanced reasoning and adaptive thinking.
          1M-token context, up to 128K output (verified against the AWS
          Bedrock model card). Reasoning model - temperature not supported.
          Adaptive thinking is incompatible with forced tool_choice, so
          structured output uses prompt-based JSON parsing (supports_tool_use:
          false). Geo-US inference profile; routes us-east-1/us-east-2/us-west-2.

      - id: opus
        full_id: global.anthropic.claude-opus-4-6-v1
        name: Claude Opus 4.6
        aliases:
          - claude-opus
          - opus4.6
          - claude-opus-4.6
        pricing:
          input_per_million: 5.00
          output_per_million: 25.00
          cache_write_per_million: 6.25
          cache_read_per_million: 0.50
        inference_params:
          # Low temp for deterministic code analysis
          default_temperature: 0.1
          max_output_tokens: 128000
        context_window: 200000
        capabilities:
          - code_review
          - security_analysis
          - reasoning
          - computer_use

      - id: sonnet
        full_id: global.anthropic.claude-sonnet-4-6
        name: Claude Sonnet 4.6
        aliases:
          - claude-sonnet
          - sonnet4.6
          - claude-sonnet-4.6
        pricing:
          input_per_million: 3.00
          output_per_million: 15.00
          cache_write_per_million: 3.75
          cache_read_per_million: 0.30
        inference_params:
          default_temperature: 0.1
          max_output_tokens: 64000
        context_window: 200000
        capabilities:
          - code_review
          - coding
          - agents
          - computer_use
          - reasoning
        notes: >-
          Approaches Opus 4.6 intelligence at
          lower cost, frontier coding and agents

      - id: haiku
        full_id: >-
          global.anthropic.claude-haiku-4-5-20251001-v1:0
        name: Claude Haiku 4.5
        aliases:
          - claude-haiku
        pricing:
          input_per_million: 1.00
          output_per_million: 5.00
          cache_write_per_million: 1.25
          cache_read_per_million: 0.10
        inference_params:
          default_temperature: 0.1
          max_output_tokens: 64000
        context_window: 200000
        capabilities:
          - code_review
          - real_time_assistants
          - parallel_agents
        notes: >-
          73.3% SWE-bench Verified, fast and
          cost-effective

      # Qwen3 Coder Model (Alibaba)
      # MoE: 480B total, 35B active parameters
      # Best for: Specialized code generation
      - id: qwen-bedrock
        full_id: qwen.qwen3-coder-480b-a35b-v1:0
        name: Qwen3 Coder 480B (Bedrock)
        aliases:
          - qwen
          - qwen-coder
        pricing:
          input_per_million: 0.22
          output_per_million: 1.40
        inference_params:
          # Lower than default 0.7 for code review
          default_temperature: 0.3
          default_top_p: 0.8
          default_top_k: 20
          max_output_tokens: 65536
        context_window: 131072
        architecture: "MoE (480B total, 35B active)"
        capabilities:
          - code_generation
          - code_review
          - agentic_coding
          - browser_automation
        notes: >-
          87.9% MultiPL-E score, specialized
          for coding tasks

      # Kimi K2.5 Model (Moonshot AI, Bedrock)
      # MoE: 1T total, 32B active parameters
      # Best for: Reasoning, multimodal analysis
      - id: kimi-k2.5-bedrock
        full_id: moonshotai.kimi-k2.5
        name: Kimi K2.5 (Bedrock)
        # Bedrock-suffixed aliases only — `kimi` is claimed by the
        # Moonshot direct provider (canonical owner of the model family).
        aliases:
          - kimi-bedrock
          - kimi25-bedrock
        pricing:
          # Verified: AWS Bedrock (Feb 2026)
          input_per_million: 0.60
          output_per_million: 3.00
        inference_params:
          # Lowered from 0.6 for code review
          default_temperature: 0.5
          default_top_p: 0.95
          default_top_k: 40
          max_output_tokens: 65536
        context_window: 262000
        architecture: "MoE (1T total, 32B active)"
        capabilities:
          - reasoning
          - multimodal
          - code_review
          - tool_use
          - agentic_tasks
        notes: >-
          1T MoE multimodal, native image
          understanding, Bedrock Converse API

      # Qwen3 Coder Next (Alibaba, Bedrock)
      # MoE: 80B total, 3B active parameters
      # Best for: Efficient agentic coding
      # Note: Does NOT support thinking mode
      - id: qwen-next-bedrock
        full_id: qwen.qwen3-coder-next
        name: Qwen3 Coder Next (Bedrock)
        aliases:
          - qwen-next
          - qwen3-next
          - qwen-coder-next
        pricing:
          # Verified: AWS Bedrock (Feb 2026)
          input_per_million: 0.50
          output_per_million: 1.20
        inference_params:
          # Lowered from 0.7 for code review
          default_temperature: 0.3
          default_top_p: 0.95
          default_top_k: 40
          max_output_tokens: 16384
        context_window: 262000
        architecture: "MoE (80B total, 3B active)"
        capabilities:
          - code_generation
          - code_review
          - agentic_coding
          - tool_use
        notes: >-
          Ultra-sparse MoE (3B active),
          70%+ SWE-Bench Verified,
          purpose-built for coding agents

      # MiniMax M2.5 Model (Bedrock)
      # MoE: 230B total, 10B active parameters
      # Agent-native frontier model optimized for task decomposition
      # 80.2% SWE-Bench Verified, 37% faster than M2.1
      # Best for: Agentic workflows, complex code review
      - id: minimax-m2.5-bedrock
        full_id: minimax.minimax-m2.5
        name: MiniMax M2.5 (Bedrock)
        aliases:
          - mm2.5-bedrock
        pricing:
          # TBD - update when AWS publishes
          input_per_million: 0.00
          output_per_million: 0.00
        inference_params:
          # IMPORTANT: M2.5 was RL-trained assuming temp=1.0.
          # However, for deterministic code review on Bedrock
          # (which lacks thinking mode), we use 0.5 to balance
          # consistency with M2.5's trained distribution.
          default_temperature: 0.5
          default_top_p: 0.95
          default_top_k: 40
          max_output_tokens: 128000
        # Shared 192K input+output window (196608 tokens).
        # Bedrock enforces same limits as NVIDIA NIM.
        context_window: 196608
        # MiniMax M2.5 on Bedrock doesn't support tool use for structured output
        supports_tool_use: false
        architecture: "MoE (230B total, 10B active)"
        capabilities:
          - coding
          - reasoning
          - agentic_tasks
          - code_review
        notes: >-
          80.2% SWE-Bench Verified, agent-native frontier
          model trained for efficient task decomposition,
          37% faster than M2.1, cost-efficient MoE.
          Uses prompt-based JSON parsing on Bedrock.

      # GLM 5 Model (Zhipu AI via Bedrock)
      # Frontier-class model optimized for systems engineering
      # 200K context window, 128K max output
      # Best for: Complex reasoning, long-horizon agentic tasks
      - id: glm5-bedrock
        full_id: zai.glm-5
        name: GLM 5 (Bedrock)
        aliases:
          - glm-5-bedrock
          - glm5b
        pricing:
          # TBD - update when AWS publishes
          input_per_million: 0.00
          output_per_million: 0.00
        inference_params:
          # Lowered from 1.0 for non-creative code review.
          # Model docs recommend 0.5-0.7 for structured tasks.
          default_temperature: 0.5
          default_top_p: 0.95
          max_output_tokens: 128000
        context_window: 200000
        capabilities:
          - reasoning
          - code_review
          - code_generation
          - agentic_tasks
          - tool_use
        notes: >-
          Frontier-class model optimized for complex systems
          engineering and long-horizon agentic tasks,
          multi-step reasoning, advanced coding, tool-augmented
          workflows

  # Azure OpenAI Provider
  azure_openai:
    endpoint: "${AZURE_OPENAI_ENDPOINT}"
    api_key: "${AZURE_OPENAI_API_KEY}"
    api_version: "2025-04-01-preview"
    models:
      # GPT-5.4 Model (base, non-Pro)
      # Frontier reasoning model, GPT-5 family
      # Best for: Code review, complex reasoning, structured output
      # Note: Reasoning model — temperature/top_p NOT supported.
      #   Tool calling IS supported (unlike GPT-5.4 Pro and
      #   DeepSeek-V4-Pro on Azure), so with_structured_output works
      #   without falling back to prompt-based JSON parsing.
      - id: gpt-5.4
        deployment_name: gpt-5.4
        name: GPT-5.4
        aliases:
          - gpt
          - gpt54
          - gpt5.4
        pricing:
          # Azure Foundry standard tier (≤272K input).
          # Confirmed by Microsoft staff (Q&A 2026-03-28),
          # matches OpenAI direct pricing 1:1.
          # >272K long-context tier costs 2x input / 1.5x output:
          # $5.00 / $0.50 cached / $22.50 — apply manually if you
          # routinely send prompts larger than 272K.
          input_per_million: 2.50
          output_per_million: 15.00
          # 90% discount on cached input
          cached_input_per_million: 0.25
        inference_params:
          # No default_temperature / default_top_p: GPT-5 reasoning
          # models reject these parameters. Reasoning effort defaults
          # to 'medium' on the API side; explicit setting omitted so
          # operators can override per request without a config edit.
          max_output_tokens: 128000
        # Reasoning summaries (chain-of-thought) require Responses API
        # — same rationale as GPT-5.4 Pro and the rest of the GPT-5
        # series on Azure.
        use_responses_api: true
        context_window: 1050000
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - structured_output
          - function_calling
          - tool_use
        notes: >-
          Frontier reasoning model, 1.05M context,
          128K output, supports reasoning.effort
          low/medium/high/xhigh. Tool calling enabled
          → with_structured_output works directly.

      # GPT-5.4 Pro Model
      # Deeper reasoning variant of GPT-5.4
      # Best for: Complex reasoning, hard problems
      # Note: Responses API only, no structured outputs
      #   but function calling works for structured output
      - id: gpt-5.4-pro
        deployment_name: gpt-5.4-pro
        name: GPT-5.4 Pro
        aliases:
          - gpt54-pro
          - gpt-pro
          - gpt54p
        pricing:
          input_per_million: 30.00
          output_per_million: 180.00
          cached_input_per_million: 3.00
        inference_params:
          # Temperature/top_p NOT supported with
          # reasoning models (GPT-5.4 Pro always
          # uses reasoning: medium/high/xhigh)
          max_output_tokens: 128000
        # GPT-5.4 Pro uses Responses API
        use_responses_api: true
        context_window: 1050000
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - function_calling
          - computer_use
        notes: >-
          Deeper reasoning variant of GPT-5.4,
          uses more compute for harder problems,
          supports reasoning.effort medium/high/xhigh

      # Kimi K2.5 (Azure AI Foundry)
      # MoE: 1T total, 32B active parameters
      # Best for: Reasoning, multimodal analysis
      - id: kimi-k2.5-azure
        deployment_name: Kimi-K2.5
        name: Kimi K2.5 (Azure)
        aliases:
          - kimi25-azure
          - kimi-azure
        pricing:
          # Microsoft Foundry (Feb 2026)
          input_per_million: 0.60
          output_per_million: 3.00
        inference_params:
          # Lowered from 0.6 for code review
          default_temperature: 0.5
          default_top_p: 0.95
          max_output_tokens: 65536
        context_window: 262144
        capabilities:
          - reasoning
          - multimodal
          - code_review
          - tool_use
          - agentic_tasks
        notes: >-
          1T MoE multimodal, 96.1% AIME 2025,
          Agent Swarm support

      # DeepSeek-V4-Pro (Azure AI Foundry)
      # Reasoning model with chain-of-thought
      # Best for: Complex reasoning, deep code analysis
      # Note: No tool use on Foundry → prompt-based JSON
      #   (see CLAUDE.md: same pattern as MiniMax M2.5 on Bedrock;
      #   supports_tool_use: false routes to PydanticOutputParser
      #   instead of with_structured_output)
      - id: deepseek-v4-pro-azure
        deployment_name: DeepSeek-V4-Pro
        name: DeepSeek-V4-Pro (Azure)
        # Azure-suffixed aliases only — base names like
        # `deepseek-v4`, `deepseek-v4-pro`, `dsv4` are claimed by
        # the direct DeepSeek API provider (canonical owner).
        aliases:
          - dsv4-azure
          - deepseek-v4-azure
          - ds-v4-azure
        pricing:
          # DeepSeek list price (Azure Foundry pricing page
          # is JS-rendered and shows "$-" for DeepSeek tiers
          # at the time of this entry; update once Azure
          # publishes per-token rates). 75% promo through
          # 2026-05-31 brings effective rate to $0.435/$0.87.
          input_per_million: 1.74
          output_per_million: 3.48
          # 1/10 of cache-miss input per DeepSeek docs
          cached_input_per_million: 0.174
        inference_params:
          # Reasoning model: temperature/top_p NOT supported.
          # Foundry caps output at 384K; we keep a conservative
          # max_output_tokens to bound per-batch cost while still
          # leaving room for the chain-of-thought.
          max_output_tokens: 32000
        context_window: 1000000
        # Foundry: "Tool calling: No" → use prompt-based JSON
        supports_tool_use: false
        architecture: "MoE (DeepSeek V4 family)"
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - thinking
          - structured_output
        notes: >-
          1M-token context, 384K max output, chain-of-thought
          reasoning, no tool calling on Azure Foundry,
          en/zh languages

  # NVIDIA NIM API Provider
  # Models available via build.nvidia.com
  nvidia:
    api_key: "${NVIDIA_API_KEY}"
    # base_url: "${NVIDIA_BASE_URL}"
    # 15 min for 202 polling
    polling_timeout: 900
    # Retry 504/502/503 up to 5 times
    max_retries: 5
    models:
      # Mistral Small 4 119B (Mistral AI)
      # MoE: 119B total, 128 experts, 4 active per token
      # ~6-8B active parameters (incl. embedding/output)
