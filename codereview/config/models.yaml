      # MiniMax M2.7 (via NVIDIA)
      # MoE: 230B total, 10B active (62 layers,
      # 256 experts, 8 activated per token)
      # 204,800 input context length
      # Best for: Complex software engineering,
      # agentic tool use, long-horizon workflows
      - id: minimax-m2.7-nvidia
        full_id: minimaxai/minimax-m2.7
        name: MiniMax M2.7 (NVIDIA)
        aliases:
          - mm2.7-nvidia
          - minimax-m2.7
          - mm27
          # Absorbed from minimax-m2.5-nvidia (NVIDIA deprecated the M2.5
          # endpoint 2026-05-12). Old invocations now resolve to M2.7.
          - minimax-m2.5-nvidia
          - mm2.5-nvidia
          - minimax-m2.5
          - mm25
        pricing:
          input_per_million: 0.00
          output_per_million: 0.00
        inference_params:
          # NVIDIA model card recommends
          # temperature=1.0, top_p=0.95, top_k=40
          default_temperature: 1.0
