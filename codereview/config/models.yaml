          - tool_use
          - agentic_tasks
        notes: >-
          1T MoE multimodal, 96.1% AIME 2025,
          Agent Swarm support

      # Grok 4 Fast Reasoning (Azure Foundry)
      # xAI's cost-efficient reasoning model
      # Best for: Fast reasoning, cost-efficient
