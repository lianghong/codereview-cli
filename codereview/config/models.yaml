# Default model configuration
defaults:
  bedrock_default: opus4.7
  azure_default: gpt-5.3-codex
  nvidia_default: devstral
  aws_region: us-west-2
  max_tokens: 16000

# File scanning configuration
scanning:
  max_file_size_kb: 500
  warn_file_size_kb: 100
  exclude_patterns:
    # Dependency directories
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/vendor/**"
    # Build outputs
    - "**/dist/**"
    - "**/build/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/*.pyo"
    # Version control
    - "**/.git/**"
    - "**/.svn/**"
    # IDE and editors
    - "**/.vscode/**"
    - "**/.idea/**"
    - "**/*.swp"
    # Test fixtures and generated code
    - "**/test_data/**"
    - "**/fixtures/**"
    - "**/*_pb2.py"
    - "**/*_pb2_grpc.py"
    # Common non-review files
    - "**/*.min.js"
    - "**/*.min.css"
    - "**/migrations/**"
    - "**/*.lock"
  exclude_extensions:
    - ".json"
    - ".yaml"
    - ".yml"
    - ".toml"
    - ".md"
    - ".txt"
    - ".rst"
    - ".jpg"
    - ".png"
    - ".gif"
    - ".svg"
    - ".bin"
    - ".exe"
    - ".so"
    - ".dylib"
    - ".pyc"
    - ".pyo"

# Code Review Recommendations
#
# For accurate, deterministic code review:
# - Use temperature 0.0-0.3 (lower = consistent)
# - Use top_p 0.8-0.95 for controlled output
# - Prefer models with strong SWE-bench scores
#
# Model selection by use case:
# - Quick: Haiku ($1/$5) or Qwen ($0.22/$1.40)
# - Standard: Sonnet 4.6 ($3/$15) or Gemini ($2/$12)
# - Complex: Opus ($5/$25) or GPT-5.3 ($1.75/$14)
# - Budget: Qwen ($0.22/$1.40) or Grok ($0.20)
