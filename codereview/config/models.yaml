  # Azure OpenAI Provider
  azure_openai:
    endpoint: "${AZURE_OPENAI_ENDPOINT}"
    api_key: "${AZURE_OPENAI_API_KEY}"
    api_version: "2025-04-01-preview"
    models:
      # GPT-5.3 Codex Model
      # Best for: Enterprise code review, agentic coding
      # Note: Requires Responses API
      - id: gpt-5.3-codex
        deployment_name: gpt-5.3-codex
        name: GPT-5.3 Codex
        aliases:
          - gpt
          - gpt53
          - codex
        pricing:
          input_per_million: 1.75
          output_per_million: 14.00
          # 90% discount on cached
          cached_input_per_million: 0.175
        inference_params:
          # Zero temp for deterministic analysis
          default_temperature: 0.0
          default_top_p: 0.95
          max_output_tokens: 128000
        # GPT-5.3 Codex uses Responses API
        use_responses_api: true
        context_window: 400000
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - structured_output
          - function_calling
          - agentic_coding
        notes: >-
          Unifies frontier coding with broader
          reasoning, supports xhigh reasoning effort

      # GPT-5.4 Pro Model
      # Deeper reasoning variant of GPT-5.4
      # Best for: Complex reasoning, hard problems
      # Note: Responses API only, no structured outputs
      #   but function calling works for structured output
      - id: gpt-5.4-pro
        deployment_name: gpt-5.4-pro
        name: GPT-5.4 Pro
        aliases:
          - gpt54-pro
          - gpt-pro
          - gpt54p
        pricing:
          input_per_million: 30.00
          output_per_million: 180.00
          cached_input_per_million: 3.00
        inference_params:
          # Temperature/top_p NOT supported with
          # reasoning models (GPT-5.4 Pro always
          # uses reasoning: medium/high/xhigh)
          max_output_tokens: 128000
        # GPT-5.4 Pro uses Responses API
        use_responses_api: true
        context_window: 1050000
        capabilities:
          - reasoning
          - code_review
          - security_analysis
          - function_calling
          - computer_use
        notes: >-
          Deeper reasoning variant of GPT-5.4,
          uses more compute for harder problems,
          supports reasoning.effort medium/high/xhigh

      # Kimi K2.5 (Azure AI Foundry)
      # MoE: 1T total, 32B active parameters
