  # OpenAI-format compatible at https://api.deepseek.com.
  # Both V4-Pro and V4-Flash support tool calling and structured output
  # natively (unlike DeepSeek-V4-Pro on Azure Foundry, which requires
  # prompt-based JSON parsing because SGLang doesn't expose tools).
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    api_base: "https://api.deepseek.com"
    request_timeout: 300
    models:
      # DeepSeek V4 Pro - flagship reasoning + agentic model
      # 1M context, 384K max output, three reasoning modes
      - id: deepseek-v4-pro
        full_id: deepseek-v4-pro
        name: DeepSeek-V4-Pro
        aliases:
          - dsv4-pro
          - ds-v4-pro
          - dsv4pro
        pricing:
          # DeepSeek list price (https://api-docs.deepseek.com/quick_start/pricing).
          # Per DeepSeek docs, the 75% launch promo ends 2026-05-31 15:59 UTC,
          # after which the steady-state rate is 1/4 of the original list
          # ($1.74/$3.48) → $0.435/$0.87. Values below reflect that post-promo
          # steady-state rate.
          input_per_million: 0.435
          output_per_million: 0.87
          # Cache hit at 1/10 of cache miss
          cached_input_per_million: 0.0435
        inference_params:
          # Lower temp for code review determinism (model default 1.0)
          default_temperature: 0.3
          default_top_p: 0.95
          max_output_tokens: 16384
        context_window: 1000000
        capabilities:
